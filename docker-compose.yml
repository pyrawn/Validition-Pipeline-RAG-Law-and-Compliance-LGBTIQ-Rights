# ── Apache Airflow + Streamlit · docker-compose.yml ──────────────────────────
# MongoDB runs on Atlas — no local mongo service.
# All services load secrets from .env at the project root.
# ─────────────────────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  build: .
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./tasks:/opt/airflow/tasks
    - ./data:/opt/airflow/data
    - ./config:/opt/airflow/config
    - ./logs:/opt/airflow/logs
    - ./.env:/opt/airflow/.env
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── Metadata database ───────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ── Airflow init (runs once, then exits) ────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL} || true
        airflow pools set extract_pool 3 "Limits concurrent state extractions to avoid OOM"
        airflow pools set transform_pool 3 "Limits concurrent state transforms to avoid OOM"
    restart: on-failure

  # ── Airflow webserver ───────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow scheduler ───────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Streamlit dashboard ─────────────────────────────────────────────────────
  streamlit:
    image: python:3.11-slim
    volumes:
      - ./app:/app
      - ./requirements.txt:/requirements.txt
    working_dir: /app
    command: >
      bash -c "pip install streamlit plotly folium streamlit-folium
      altair pymongo pyyaml python-dotenv &&
      streamlit run main.py --server.address=0.0.0.0 --server.port=8501"
    ports:
      - "8501:8501"
    env_file:
      - .env
    restart: on-failure

volumes:
  postgres-db-volume:
